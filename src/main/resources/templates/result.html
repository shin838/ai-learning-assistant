<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>생성된 문제 - AI Learning Assistant</title>
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
	<header class="page-header">
		<h1>생성된 객관식 문제</h1>
		<p class="scope">시험 범위: <span th:text="${result.examScope()}">Java</span></p>
	</header>

	<ol class="question-list">
		<li class="question" th:each="question : ${result.questions()}">
			<h2 th:text="${question.number()} + '. ' + ${question.content()}">1. 문제 내용</h2>
			<ol class="choices">
				<li th:each="choice : ${question.choices()}" th:text="${choice}">보기</li>
			</ol>
			<p class="answer">정답: <span th:text="${question.answerNumber()}">1</span>번</p>
			<p class="explanation" th:text="${question.explanation()}">해설</p>
		</li>
	</ol>

	<a class="button" href="/">다시 생성하기</a>
</main>
</body>
</html>
