<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI Learning Assistant</title>
	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: #f5f7fb;
			color: #1f2937;
		}

		main {
			width: min(920px, calc(100% - 32px));
			margin: 48px auto;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 32px;
		}

		.lead {
			margin: 0 0 32px;
			color: #4b5563;
			line-height: 1.6;
		}

		form {
			display: grid;
			gap: 24px;
			padding: 28px;
			border: 1px solid #d8dee9;
			border-radius: 8px;
			background: #ffffff;
		}

		label {
			display: block;
			margin-bottom: 8px;
			font-weight: 700;
		}

		textarea {
			box-sizing: border-box;
			width: 100%;
			min-height: 150px;
			padding: 14px 16px;
			border: 1px solid #c7d0dd;
			border-radius: 6px;
			font: inherit;
			line-height: 1.5;
			resize: vertical;
		}

		button {
			justify-self: start;
			padding: 12px 18px;
			border: 0;
			border-radius: 6px;
			background: #2563eb;
			color: #ffffff;
			font: inherit;
			font-weight: 700;
			cursor: pointer;
		}

		button:hover {
			background: #1d4ed8;
		}
	</style>
</head>
<body>
<main>
	<h1>AI Learning Assistant</h1>
	<p class="lead">시험 범위를 입력하면 객관식 문제 생성을 준비합니다.</p>

	<form method="post" action="/questions/generate">
		<div>
			<label for="examScope">시험 범위</label>
			<textarea id="examScope" name="examScope" placeholder="예: Java 21 기본 문법, 객체지향, 컬렉션, 예외 처리"></textarea>
		</div>

		<button type="submit">문제 생성</button>
	</form>
</main>
</body>
</html>
