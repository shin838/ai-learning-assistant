<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI Learning Assistant</title>
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
	<header class="page-header">
		<h1>AI Learning Assistant</h1>
		<p class="lead">시험 범위를 입력하면 객관식 문제 생성을 준비합니다.</p>
	</header>

	<p class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">오류 메시지</p>

	<form class="form-panel" method="post" action="/questions/generate">
		<div>
			<label for="examScope">시험 범위</label>
			<textarea id="examScope" name="examScope" placeholder="예: Java 21 기본 문법, 객체지향, 컬렉션, 예외 처리" th:text="${examScope}"></textarea>
		</div>

		<button type="submit">문제 생성</button>
	</form>
</main>
</body>
</html>
